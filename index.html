<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Shell Script</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #result {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            font-size: 14px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            color: #333;
            display: none;
        }
        
        #result.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Jira to Shell Script Generator</h1>
        <form id="scriptForm">
            <div class="form-group">
                <label for="issue_key">Enter Jira Issue Key:</label>
                <input type="text" id="issue_key" name="issue_key" placeholder="e.g., JIRA-123" required>
            </div>
            <button type="submit">Generate Script</button>
        </form>
        <pre id="result"></pre>
    </div>

    <script>
        document.getElementById('scriptForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const issueKey = document.getElementById('issue_key').value;
            const res = await fetch('/generate_script', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({issue_key: issueKey})
            });
            const data = await res.json();
            const resultEl = document.getElementById('result');
            resultEl.textContent = data.result || data.error;
            resultEl.classList.add('show');
        });
    </script>
</body>
</html>
